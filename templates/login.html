<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MarketDesk — Login</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 40px 36px;
      width: 100%;
      max-width: 380px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
    }
    .logo {
      text-align: center;
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 6px;
    }
    .logo span { color: #58a6ff; }
    .subtitle {
      text-align: center;
      color: #8b949e;
      font-size: 13px;
      margin-bottom: 32px;
    }
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }
    input[type="password"] {
      width: 100%;
      background: #1c2330;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 12px 14px;
      color: #e6edf3;
      font-size: 16px;
      outline: none;
      transition: border-color .15s;
      margin-bottom: 20px;
    }
    input[type="password"]:focus { border-color: #58a6ff; }
    button {
      width: 100%;
      background: #58a6ff;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 13px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: background .15s;
    }
    button:hover { background: #79b8ff; }
    .error {
      background: rgba(248,81,73,.12);
      border: 1px solid rgba(248,81,73,.3);
      color: #f85149;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      margin-bottom: 16px;
      text-align: center;
    }
    .footer {
      text-align: center;
      color: #8b949e;
      font-size: 11px;
      margin-top: 28px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">📊 <span>Market</span>Desk</div>
    <div class="subtitle">Stock Analysis Dashboard</div>

    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST">
      <label for="password">Password</label>
      <input type="password" id="password" name="password"
             placeholder="Enter your password" autofocus autocomplete="current-password"/>
      <button type="submit">Sign In →</button>
    </form>

    <div class="footer">Your session stays active until you sign out.</div>
  </div>
</body>
</html>
